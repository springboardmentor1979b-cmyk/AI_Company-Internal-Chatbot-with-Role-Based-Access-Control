[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["python3.11 -m pip install --upgrade pip", "python3.11 -m pip install -r requirements.txt"]

[phases.build]
cmds = [
  "python3.11 -m backend.init_users",
  "python3.11 -m preprocessing.preprocess_all",
  "python3.11 -m vector_db.embedding_engine"
]

[start]
cmd = "python3.11 -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
